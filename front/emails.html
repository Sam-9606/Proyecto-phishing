<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-phish analyzer - Analyzed Emails</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f7fe;
        }

        .table td,
        .table th {
            vertical-align: middle;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom py-3">
        <div class="container">

            <a class="navbar-brand d-flex align-items-center text-primary fw-bold" href="index.html">
                <i class="bi bi-shield-check me-2"></i>
                e-phish analyzer
            </a>

            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-3">

                    <li class="nav-item">
                        <a class="nav-link" href="analisador.html">
                            <i class="bi bi-search me-1"></i>
                            Analyze
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active bg-light rounded px-3" href="emails.html">
                            <i class="bi bi-list-ul me-1"></i>
                            Email List
                        </a>
                    </li>

                </ul>
            </div>

            <div class="d-flex gap-2">

                <a href="admin.html"
                   id="adminBtn"
                   class="btn btn-outline-primary btn-sm px-3 fw-semibold d-none">
                    Admin
                </a>

                <a href="login.html"
                   id="authBtn"
                   class="btn btn-outline-primary btn-sm px-3 fw-semibold">
                    Log Out
                </a>

            </div>
        </div>
    </nav>

    <div class="container my-5">

        <div class="mb-4">
            <h2 class="fw-bold text-dark">Analyzed Emails</h2>

            <p class="text-muted">
                Historical phishing analysis records generated by the detection engine.
            </p>
        </div>

        <div class="card border-0 shadow-sm rounded-3 overflow-hidden">

            <div class="table-responsive">

                <table class="table table-hover align-middle mb-0 bg-white">

                    <thead class="table-light text-uppercase small text-muted">
                        <tr>
                            <th>Email Address</th>
                            <th>Status</th>
                            <th>Risk Score</th>
                            <th>Analyzed At</th>
                            <th>Source</th>
                            <th id="actionsHeader" class="text-center d-none">Actions</th>
                        </tr>
                    </thead>

                    <tbody id="emailTableBody" class="small">

                        <tr>
                            <td colspan="6" class="text-center py-4 text-muted">
                                Loading analysis history...
                            </td>
                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <script src="emails.js"></script>

</body>
</html>
