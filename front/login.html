<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
    <title>e-phish analyzer - Authentication</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>

    <div class="container d-flex justify-content-center align-items-center" style="margin-top: 40px; margin-bottom: 40px;">
        <div class="card auth-card p-4 p-md-5 w-100 transition-fade">
            
            <div class="text-primary fs-1 text-center mb-3">
                <i class="bi bi-shield-lock-fill"></i>
            </div>

            <div id="loginSection">
                <h3 class="fw-bold text-dark text-center mb-1">Log in to e-phish analyzer</h3>
                <p class="text-muted small text-center mb-4">Enter your credentials to access your analysis history</p>

                <div id="loginAlert" class="alert alert-danger d-flex align-items-center text-start py-2 px-3 mb-4 d-none" role="alert" style="font-size: 0.8rem;">
                    <i class="bi bi-exclamation-circle-fill me-2"></i>
                    <div id="errorText">Incorrect email or password. Please try again.</div>
                </div>

                <form id="loginForm">
                    <div class="mb-3 text-start">
                        <label class="form-label small fw-semibold text-muted mb-1">Email address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light text-muted"><i class="bi bi-envelope"></i></span>
                            <input type="text" id="username" class="form-control" placeholder="user@example.com" required>
                        </div>
                    </div>
                    <div class="mb-3 text-start">
                        <div class="d-flex justify-content-between">
                            <label class="form-label small fw-semibold text-muted mb-1">Password</label>
                        </div>
                        <div class="input-group">
                            <span class="input-group-text bg-light text-muted"><i class="bi bi-key"></i></span>
                            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                        </div>
                    </div>
                    <div class="form-check text-start mb-4">
                        <input class="form-check-input" type="checkbox" id="rememberMe" checked>
                        <label class="form-check-label small text-muted" for="rememberMe">Remember me</label>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold mb-3">Log in</button>
                </form>
            </div>

        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
